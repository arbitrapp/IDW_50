<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDW S.A</title>
    <!-- <link rel="stylesheet" href="contacto.css" /> -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- NAVBAR -->
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
          <a class="navbar-brand" href="#">
            <img src="assets/logo.png" height="60" alt="Logo" class="me-2" />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav"
          >
            <ul class="navbar-nav text-center">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="institucional.html">Institucional</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="contacto.html">Contacto</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <!-- HERO -->
    <section class="bg-primary text-white text-center py-5">
      <div class="container">
        <h1 class="fw-bold">Centro Médico Galeano</h1>
        <p class="lead">
          Comprometidos con tu salud, tu bienestar y tu comunidad.
        </p>
      </div>
    </section>
    <main class="container my-5">
      <section class="row shadow rounded overflow-hidden bg-white">
        <!-- Imagen -->
        <div class="col-md-6 d-none d-md-block p-0">
          <img
            src="https://www.future-doctor.de/wp-content/uploads/2024/08/shutterstock_2480850611.jpg.webp"
            alt="Imagen de contacto"
            class="img-fluid h-100 w-100 object-fit-cover"
          />
        </div>

        <!-- Formulario -->
        <article class="col-md-6 p-4 d-flex align-items-center">
          <form action="#" class="w-100">
            <h2 class="text-center text-primary fw-bold mb-4">
              Estamos a un mensaje de distancia.<br />
              ¿Cómo podemos ayudarte?
            </h2>

            <div class="mb-3">
              <label for="name" class="form-label">Nombre</label>
              <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                required
                placeholder="Tu nombre"
              />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                required
                placeholder="ejemplo@email.com"
              />
            </div>

            <div class="mb-3">
              <label for="message" class="form-label">Mensaje</label>
              <textarea
                class="form-control"
                id="message"
                name="message"
                rows="4"
                required
                placeholder="Escribe tu mensaje..."
              ></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
              Enviar Mensaje
            </button>
          </form>
        </article>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
      &copy; 2025 Centro Médico Galeano - Todos los derechos reservados.
    </footer>
  </body>
</html>
